<section class="hero">
  <h2>Structured Civic Debate</h2>
  <p>Create arguments, respond with rebuttals, and vote on persuasiveness.</p>
</section>

<!-- CREATE DEBATE -->
<section class="post-box">
  <h3>Create a Debate</h3>

  <input id="topic" placeholder="Debate Topic (e.g. Should hate speech be protected?)" />
  <br><br>

  <textarea id="affirmative" placeholder="Affirmative Argument (Pro)"></textarea>
  <br><br>

  <textarea id="negative" placeholder="Negative Argument (Con)"></textarea>
  <br><br>

  <button onclick="createDebate()">Publish Debate</button>
</section>

<!-- DEBATES LIST -->
<section>
  <h2>Active Debates</h2>
  <div id="debateList"></div>
</section>
